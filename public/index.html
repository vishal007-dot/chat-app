<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat App</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#111;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* Header */
.header {
  background:#075E54;
  color:white;
  padding:15px;
  font-weight:bold;
}

/* Chat */
#chat {
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

/* Messages */
.msg {
  padding:10px;
  margin:5px;
  border-radius:10px;
  max-width:70%;
}

.me {
  background:#DCF8C6;
  align-self:flex-end;
}

.other {
  background:#fff;
  align-self:flex-start;
}

/* Input */
#input-area {
  display:flex;
  padding:10px;
  background:#222;
}

input {
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  outline:none;
}

button {
  margin-left:10px;
  padding:10px 15px;
  border:none;
  background:#25D366;
  color:white;
  border-radius:50%;
}
</style>

</head>

<body>

<div class="header">💬 Chat App</div>

<div id="chat"></div>

<div id="input-area">
  <input id="message" placeholder="Type a message">
  <button onclick="send()">➤</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();
let username = prompt("Enter your name:");
socket.emit("join", username);

function send(){
  const input = document.getElementById("message");

  if(input.value.trim() !== ""){
    socket.emit("chat message", input.value);
    input.value="";
  }
}

socket.on("chat message",(data)=>{
  const div=document.createElement("div");

  div.className = data.user === username ? "msg me" : "msg other";
  div.innerText = data.text;

  document.getElementById("chat").appendChild(div);

  // auto scroll
  document.getElementById("chat").scrollTop =
    document.getElementById("chat").scrollHeight;
});

</script>

</body>
</html>
