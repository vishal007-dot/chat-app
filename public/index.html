<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Pro</title>

<style>
body {margin:0;font-family:Arial;background:#ece5dd;height:100vh;display:flex;flex-direction:column;}

.header {background:#075E54;color:white;padding:10px;display:flex;align-items:center;}
.header img {width:35px;height:35px;border-radius:50%;margin-right:10px;}
.status {font-size:12px;}

#chat {flex:1;padding:10px;overflow-y:auto;display:flex;flex-direction:column;}

.msg {max-width:70%;padding:10px;margin:5px;border-radius:10px;font-size:14px;position:relative;}
.me {background:#dcf8c6;align-self:flex-end;}
.other {background:white;}

.tick {font-size:10px;position:absolute;bottom:3px;right:8px;}

#typing {font-size:12px;padding:5px;color:gray;}

#input-area {display:flex;padding:8px;background:#f0f0f0;}
input {flex:1;padding:10px;border-radius:20px;border:none;}

.send-btn {width:50px;height:50px;margin-left:8px;background:#25D366;color:white;border:none;border-radius:50%;font-size:18px;}
</style>

</head>

<body>

<div class="header">
  <img src="https://i.pravatar.cc/150?img=5">
  <div>
    <div>Chat Room</div>
    <div class="status" id="status">online</div>
  </div>
</div>

<div id="chat"></div>
<div id="typing"></div>

<div id="input-area">
  <input id="message" placeholder="Type message..." oninput="typing()">
  <button onclick="send()" class="send-btn">➤</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();
let username = prompt("Enter your name:");
socket.emit("join", username);

function send(){
  const input = document.getElementById("message");

  if(input.value){
    socket.emit("chat message", input.value);
    input.value="";
  }
}

function typing(){
  socket.emit("typing");
}

socket.on("chat message",(data)=>{
  const div=document.createElement("div");

  div.className = data.user === username ? "msg me" : "msg other";
  div.innerHTML = data.text + "<span class='tick'>✔✔</span>";

  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = chat.scrollHeight;

  socket.emit("seen");
});

socket.on("status",(msg)=>{
  document.getElementById("status").innerText = msg;
});

socket.on("typing",(msg)=>{
  document.getElementById("typing").innerText = msg;

  setTimeout(()=>{document.getElementById("typing").innerText="";},1000);
});

</script>

</body>
</html>
