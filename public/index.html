<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Clone</title>

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/733/733585.png">

<style>
body {
  margin:0;
  font-family:system-ui;
  background:#e5ddd5;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header {
  background:#075E54;
  color:white;
  padding:10px;
  display:flex;
  align-items:center;
}

.header img {
  width:40px;
  height:40px;
  border-radius:50%;
  margin-right:10px;
}

.name {font-weight:600;}
.status {font-size:12px;opacity:0.8;}

/* CHAT */
#chat {
  flex:1;
  padding:10px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
}

/* MESSAGE */
.msg {
  max-width:75%;
  padding:8px 10px;
  margin:5px;
  border-radius:8px;
  position:relative;
  font-size:14px;
}

.me {
  background:#d9fdd3;
  align-self:flex-end;
}

.other {
  background:white;
  align-self:flex-start;
}

.time {
  font-size:10px;
  opacity:0.6;
  text-align:right;
}

.tick {
  font-size:10px;
  color:#4fc3f7;
}

/* INPUT */
.input-area {
  display:flex;
  align-items:center;
  padding:8px;
  background:#f0f0f0;
}

.icon {
  font-size:20px;
  margin:0 5px;
}

input {
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  outline:none;
}

.send-btn {
  width:45px;
  height:45px;
  background:#25D366;
  border:none;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>

</head>

<body>

<div class="header">
  <img src="https://i.pravatar.cc/150?img=3">
  <div>
    <div class="name">Chat Room</div>
    <div class="status">online</div>
  </div>
</div>

<div id="chat"></div>

<div class="input-area">
  <span class="icon">😊</span>
  <input id="message" placeholder="Type a message" onkeydown="enterSend(event)">
  <span class="icon">📎</span>
  <span class="icon">🎤</span>

  <button onclick="send()" class="send-btn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
      <path d="M2 21L23 12L2 3V10L17 12L2 14V21Z"/>
    </svg>
  </button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();
let username = prompt("Enter your name:");
socket.emit("join", username);

function enterSend(e){
  if(e.key === "Enter"){
    send();
  }
}

function send(){
  const input = document.getElementById("message");

  if(input.value.trim()){
    socket.emit("chat message", input.value);
    input.value="";
  }
}

socket.on("chat message",(data)=>{
  const div=document.createElement("div");

  div.className = data.user === username ? "msg me" : "msg other";

  div.innerHTML = `
    <b>${data.user}</b><br>
    ${data.text}
    <div class="time">
      ${data.time} <span class="tick">✔✔</span>
    </div>
  `;

  document.getElementById("chat").appendChild(div);
  chat.scrollTop = chat.scrollHeight;
});

</script>

</body>
</html>
