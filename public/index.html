<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Clone</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#ece5dd;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header {
  background:#075E54;
  color:white;
  padding:10px;
  display:flex;
  align-items:center;
}

.header img {
  width:35px;
  height:35px;
  border-radius:50%;
  margin-right:10px;
}

.header .name {
  font-size:16px;
  font-weight:bold;
}

.header .status {
  font-size:12px;
  opacity:0.8;
}

/* CHAT AREA */
#chat {
  flex:1;
  padding:10px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
}

/* MESSAGES */
.msg {
  max-width:70%;
  padding:10px;
  margin:5px;
  border-radius:10px;
  font-size:14px;
}

.me {
  background:#dcf8c6;
  align-self:flex-end;
}

.other {
  background:white;
  align-self:flex-start;
}

/* INPUT AREA */
#input-area {
  display:flex;
  padding:8px;
  background:#f0f0f0;
  align-items:center;
}

input {
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  outline:none;
}

.send-btn {
  width:50px;
  height:50px;
  margin-left:8px;
  background:#25D366;
  color:white;
  border:none;
  border-radius:50%;
  font-size:20px;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="https://i.pravatar.cc/150?img=3">
  <div>
    <div class="name">Chat Room</div>
    <div class="status">online</div>
  </div>
</div>

<!-- CHAT -->
<div id="chat"></div>

<!-- INPUT -->
<div id="input-area">
  <input id="message" placeholder="Type a message">
  <button onclick="send()" class="send-btn">➤</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();
let username = prompt("Enter your name:");
socket.emit("join", username);

// SEND MESSAGE
function send(){
  const input = document.getElementById("message");

  if(input.value.trim() !== ""){
    socket.emit("chat message", input.value);
    input.value="";
  }
}

// RECEIVE MESSAGE
socket.on("chat message",(data)=>{
  const div=document.createElement("div");

  div.className = data.user === username ? "msg me" : "msg other";
  div.innerText = data.text;

  document.getElementById("chat").appendChild(div);

  // auto scroll
  document.getElementById("chat").scrollTop =
    document.getElementById("chat").scrollHeight;
});

</script>

</body>
</html>
